<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none">
  <!-- Background -->
  <rect width="20" height="20" rx="4" fill="#eaf0fa"/>
  <!-- Outer pillow shell -->
  <rect x="1.5" y="5" width="17" height="10" rx="3.5" stroke="#2563eb" stroke-width="1.6"/>
  <!-- Inner seam border -->
  <rect x="3.5" y="7" width="13" height="6" rx="2" stroke="#2563eb" stroke-width="0.85" opacity="0.4"/>
  <!-- Centre tuft button -->
  <circle cx="10" cy="10" r="0.9" fill="#2563eb" opacity="0.75"/>
  <!-- Gathering lines to button -->
  <line x1="10" y1="7"    x2="10" y2="8.2"  stroke="#2563eb" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>
  <line x1="10" y1="11.8" x2="10" y2="13"   stroke="#2563eb" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>
  <line x1="7"  y1="10"   x2="8.2" y2="10"  stroke="#2563eb" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>
  <line x1="11.8" y1="10" x2="13" y2="10"   stroke="#2563eb" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>
</svg>
